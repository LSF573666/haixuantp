    PayGiftRequest:
      type: object
      description: 按礼物价格直接发起第三方支付。金额 = 礼物单价 × 数量，无需用户传金额。
      properties:
        candidate_id:
          type: integer
          description: 候选人 ID
        gift_id:
          type: integer
          description: 礼物 ID
        quantity:
          type: integer
          minimum: 1
          default: 1
          description: 数量
        payment_method:
          allOf:
          - $ref: '#/components/schemas/PaymentMethod2f6Enum'
          description: '支付方式（金额由礼物价格自动计算）


            * `wechat` - 微信支付

            * `alipay` - 支付宝'
        payment_mode:
          allOf:
          - $ref: '#/components/schemas/PaymentModeEnum'
          default: native
          description: '支付模式：native=扫码（默认）；jsapi=微信内调起（需 openid）；h5=支付宝手机网站跳转


            * `native` - Native 扫码

            * `jsapi` - JSAPI 微信内支付

            * `h5` - 支付宝 H5 手机网站支付'
        openid:
          type: string
          description: 微信用户 openid；payment_mode=jsapi 时必填，须与商户 AppID 对应
          maxLength: 128
      required:
      - candidate_id
      - gift_id
      - payment_method
    PaymentMethod2f6Enum:
      enum:
