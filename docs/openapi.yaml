              schema:
                $ref: '#/components/schemas/GiftTransaction'
          description: ''
  /api/payments/dev-pay/:
    post:
      operationId: payments_dev_pay_create
      description: 开发环境模拟支付成功。
      summary: 模拟支付成功（仅开发环境）
