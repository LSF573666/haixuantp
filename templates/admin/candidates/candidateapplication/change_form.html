{% extends "admin/change_form.html" %}

{% block submit_buttons_bottom %}
{{ block.super }}
{% if approve_url or reject_url %}
<div class="submit-row" style="margin-top: 8px; display: flex; gap: 12px; align-items: center;">
  {% if approve_url %}
  <input type="submit" value="通过审核" name="_approve" class="default"
    formaction="{{ approve_url }}"
    onclick="return confirm('确认通过该报名申请？通过后将自动创建候选人并展示在候选人列表中。');">
  {% endif %}
  {% if reject_url %}
  <a href="{{ reject_url }}" class="deletelink">驳回此申请</a>
  {% endif %}
</div>
<p style="color: #666; margin-top: 8px;">
  手动审核：通过后将创建候选人；驳回后用户可修改资料重新提交。
</p>
{% endif %}
{% endblock %}
