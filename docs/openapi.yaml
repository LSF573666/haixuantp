      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/votes/cast/:
    post:
      operationId: votes_cast_create
      description: 每人每天可投票次数由后台配置（默认3票）。
      summary: 为候选人投票
      tags:
      - 投票
      requestBody:
