    post:
      operationId: candidates_applications_submit_create_2
      description: 支持个人报名（individual）与团体报名（group）。个人报名须填写姓名、性别、年龄；团体报名须填写团体名称，以及至少
        3 名成员的姓名和年龄。头像可通过 `avatar` 文件上传，或通过 `avatar_url` 传 OSS 直传后的 URL。被驳回后可修改资料后重新提交；已成为候选人也可随时修改资料，每次修改均需后台重新审核。头像和照片可不传，将保留上次内容。审核通过后自动创建或更新候选人。
      summary: 提交报名申请
      tags:
      - 报名
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                registration_type:
                  type: string
                  enum:
                  - individual
                  - group
                  description: 报名类型：individual=个人，group=团体
                name:
                  type: string
                  description: 个人姓名或团体名称
                gender:
                  type: string
                  enum:
                  - male
                  - female
                  description: 性别（个人报名必填）
                age:
                  type: integer
                  minimum: 1
                  maximum: 120
                  description: 年龄（个人报名必填）
                members:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: 成员姓名
                      age:
                        type: integer
                        minimum: 1
                        maximum: 120
                        description: 成员年龄
                    required:
                    - name
                    - age
                  description: 团体成员列表，至少 3 人；multipart 时可传 JSON 字符串
                introduction:
                  type: string
                  description: 个人/团体介绍
                avatar:
                  type: string
                  format: binary
                  description: 头像文件（与 avatar_url 二选一）
                avatar_url:
                  type: string
                  description: OSS 直传后的头像 URL
                photos:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: 展示照片（可多张）
              required:
              - registration_type
              - name
          application/json:
            schema:
              type: object
              properties:
                registration_type:
                  type: string
                  enum:
                  - individual
                  - group
                  description: 报名类型：individual=个人，group=团体
                name:
                  type: string
                  description: 个人姓名或团体名称
                gender:
                  type: string
                  enum:
                  - male
                  - female
                  description: 性别（个人报名必填）
                age:
                  type: integer
                  minimum: 1
                  maximum: 120
                  description: 年龄（个人报名必填）
                members:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: 成员姓名
                      age:
                        type: integer
                        minimum: 1
                        maximum: 120
                        description: 成员年龄
                    required:
                    - name
                    - age
                  description: 团体成员列表，至少 3 人；multipart 时可传 JSON 字符串
                introduction:
                  type: string
                  description: 个人/团体介绍
                avatar_url:
                  type: string
                  description: OSS 直传后的头像 URL
              required:
              - registration_type
              - name
              - avatar_url
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateApplication'
          description: ''
