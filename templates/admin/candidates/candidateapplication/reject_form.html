{% extends "admin/base_site.html" %}

{% block content %}
<h1>{{ title }}</h1>

<p>申请人：{{ application.name }}</p>
<p>提交时间：{{ application.created_at }}</p>

<form method="post">
  {% csrf_token %}
  <div style="margin-bottom: 16px;">
    <label for="reject_reason"><strong>驳回原因</strong>（将展示给前端用户）</label><br>
    <textarea id="reject_reason" name="reject_reason" rows="4" cols="60" placeholder="请填写驳回原因"></textarea>
  </div>
  <input type="submit" value="确认驳回" class="default" style="background: #ba2121;">
  <a href="{% url 'admin:candidates_candidateapplication_changelist' %}" style="margin-left: 12px;">取消</a>
</form>
{% endblock %}
