openapi: 3.0.3
info:
  title: 海选投票 API
  version: 1.0.0
  description: 海选投票系统后端接口文档，包含用户登录、投票、礼物、支付等功能。
paths:
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: 使用手机号和短信验证码登录，返回 JWT access/refresh token。
      summary: 手机号登录
      tags:
      - 认证
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneLoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PhoneLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PhoneLoginRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/login/password/:
    post:
      operationId: auth_login_password_create
      description: 使用手机号和密码登录，需已设置登录密码。返回 JWT access/refresh token。
      summary: 密码登录
      tags:
      - 认证
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordLoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordLoginRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/password/set/:
    post:
      operationId: auth_password_set_create
      description: 首次设置只需提供新密码；已设置过密码时需提供原密码。
      summary: 设置/修改登录密码
      tags:
      - 认证
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SetPasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SetPasswordRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/profile/:
    get:
      operationId: auth_profile_retrieve
      summary: 获取当前用户信息
      tags:
      - 认证
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: auth_profile_partial_update
      summary: 更新用户信息
      tags:
      - 认证
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileUpdateRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: 使用手机号和短信验证码注册新账号，可选设置昵称和登录密码。注册成功后自动登录并返回 JWT。
      summary: 新用户注册
      tags:
      - 认证
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegisterRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/sms/send/:
    post:
      operationId: auth_sms_send_create
      summary: 发送短信验证码
      tags:
      - 认证
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendSMSCodeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SendSMSCodeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SendSMSCodeRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: 'Takes a refresh type JSON web token and returns an access type
        JSON web

        token if the refresh token is valid.'
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/candidates/:
    get:
      operationId: candidates_list
      summary: 获取候选人列表
      parameters:
      - name: page
        required: false
        in: query
        description: 分页结果集中的页码。
        schema:
          type: integer
      tags:
      - 候选人
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCandidateListList'
          description: ''
  /api/candidates/{id}/:
    get:
      operationId: candidates_retrieve
      summary: 获取候选人详情（含照片）
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - 候选人
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateDetail'
          description: ''
  /api/candidates/applications/status/:
    get:
      operationId: candidates_applications_status_retrieve
      description: 返回当前用户的报名状态与进度反馈，供前端展示审核进度。
      summary: 查询我的报名进度
      tags:
      - 报名
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateApplicationStatus'
          description: ''
  /api/candidates/applications/submit/:
    post:
      operationId: candidates_applications_submit_create
      description: 用户上传个人信息报名参加海选，提交后进入待审核状态。被驳回后可修改姓名、介绍后重新提交；头像和照片可不传，将保留上次内容。审核通过后自动创建候选人，展示在候选人列表中。
      summary: 提交报名申请
      tags:
      - 报名
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 姓名
                introduction:
                  type: string
                  description: 个人介绍
                avatar:
                  type: string
                  format: binary
                  description: 头像
                photos:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: 展示照片（可多张）
              required:
              - name
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateApplication'
          description: ''
  /api/candidates/ranking/:
    get:
      operationId: candidates_ranking_list
      description: 按热度值降序排列的排行榜。
      summary: 候选人排行榜
      tags:
      - 候选人
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CandidateRanking'
          description: ''
  /api/config/public/:
    get:
      operationId: config_public_retrieve
