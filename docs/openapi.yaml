components:
  schemas:
    CandidateApplication:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: 姓名
          maxLength: 100
        introduction:
          type: string
          title: 个人介绍
        avatar:
          type: string
          format: uri
          title: 头像
        photos:
          type: array
          items:
            $ref: '#/components/schemas/CandidateApplicationPhoto'
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/CandidateApplicationStatusEnum'
          title: 审核状态
        status_display:
          type: string
          readOnly: true
        status_message:
          type: string
          readOnly: true
        reject_reason:
          type: string
          title: 驳回原因
        candidate_id:
          type: integer
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: 提交时间
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: 更新时间
        reviewed_at:
          type: string
          format: date-time
          nullable: true
          title: 审核时间
      required:
      - avatar
      - candidate_id
      - created_at
      - id
      - name
      - photos
      - status_display
      - status_message
      - updated_at
    CandidateApplicationPhoto:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        image:
          type: string
          format: uri
          title: 照片
        caption:
          type: string
          title: 说明
          maxLength: 200
        sort_order:
          type: integer
          maximum: 2147483647
          minimum: 0
          title: 排序
      required:
      - id
      - image
    CandidateApplicationStatus:
      type: object
      properties:
        has_application:
          type: boolean
        can_apply:
          type: boolean
        can_resubmit:
          type: boolean
        is_candidate:
          type: boolean
        resubmit_hint:
          type: string
        application:
          allOf:
          - $ref: '#/components/schemas/CandidateApplication'
          nullable: true
      required:
      - application
      - can_apply
      - can_resubmit
      - has_application
      - is_candidate
      - resubmit_hint
    CandidateApplicationStatusEnum:
      enum:
      - pending
      - approved
      - rejected
