openapi: 3.0.3
info:
  title: 海选投票 API
  version: 1.0.0
  description: 海选投票系统后端接口文档，包含用户登录、投票、礼物、支付等功能。
paths:
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: 使用手机号和短信验证码登录，返回 JWT access/refresh token。
      summary: 手机号登录
      tags:
      - 认证
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneLoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PhoneLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PhoneLoginRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/login/password/:
    post:
      operationId: auth_login_password_create
      description: 使用手机号和密码登录，需已设置登录密码。返回 JWT access/refresh token。
      summary: 密码登录
      tags:
      - 认证
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordLoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordLoginRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/password/set/:
    post:
      operationId: auth_password_set_create
      description: 需先向当前账号手机号发送验证码，验证通过后方可设置或修改密码。
      summary: 设置/修改登录密码
      tags:
      - 认证
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SetPasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SetPasswordRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/profile/:
    get:
      operationId: auth_profile_retrieve
      summary: 获取当前用户信息
      tags:
      - 认证
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: auth_profile_partial_update
      summary: 更新用户信息
      tags:
      - 认证
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileUpdateRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: 使用手机号和短信验证码注册新账号，可选设置昵称和登录密码。注册成功后自动登录并返回 JWT。
      summary: 新用户注册
      tags:
      - 认证
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegisterRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/sms/send/:
    post:
      operationId: auth_sms_send_create
      summary: 发送短信验证码
      tags:
      - 认证
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendSMSCodeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SendSMSCodeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SendSMSCodeRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: 'Takes a refresh type JSON web token and returns an access type
        JSON web

        token if the refresh token is valid.'
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/candidates/:
    get:
      operationId: candidates_list
      description: 支持按性别、报名类型筛选，以及按选手名称模糊搜索；可通过 sort_by 按热度值或投票数降序排列。不传 sort_by 时按参赛编号升序。
      summary: 获取候选人列表
      parameters:
      - in: query
        name: gender
        schema:
          type: string
          enum:
          - female
          - male
        description: 按性别筛选：male=男，female=女
      - in: query
        name: name
        schema:
          type: string
        description: 按选手名称模糊搜索（个人姓名或团体名称，不区分大小写）
      - name: page
        required: false
        in: query
        description: 分页结果集中的页码。
        schema:
          type: integer
      - in: query
        name: registration_type
        schema:
          type: string
          enum:
          - group
          - individual
        description: 按报名类型筛选：individual=个人，group=团体；不传则返回全部
      - in: query
        name: sort_by
        schema:
          type: string
          enum:
          - heat_score
          - vote_count
        description: 排序方式：heat_score=按热度值降序，vote_count=按投票数降序；列表不传则按编号升序，排行榜不传则默认按热度值
      tags:
      - 候选人
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCandidateListList'
          description: ''
  /api/candidates/{id}/:
    get:
      operationId: candidates_retrieve
      summary: 获取候选人详情（含照片）
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - 候选人
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateDetail'
          description: ''
  /api/candidates/applications/status/:
    get:
      operationId: candidates_applications_status_retrieve
      description: 返回当前用户的报名状态与进度反馈，供前端展示审核进度。
      summary: 查询我的报名进度
      tags:
      - 报名
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateApplicationStatus'
          description: ''
  /api/candidates/applications/submit/:
    post:
      operationId: candidates_applications_submit_create
      description: 支持个人报名（individual）与团体报名（group）。个人报名须填写姓名、性别、年龄；团体报名须填写团体名称，以及至少
        3 名成员的姓名和年龄。头像可通过 `avatar` 文件上传，或通过 `avatar_url` 传 OSS 直传后的 URL。被驳回后可修改资料后重新提交；已成为候选人也可随时修改资料，每次修改均需后台重新审核。头像和照片可不传，将保留上次内容。审核通过后自动创建或更新候选人。
      summary: 提交报名申请
      tags:
      - 报名
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                registration_type:
                  type: string
                  enum:
                  - individual
                  - group
                  description: 报名类型：individual=个人，group=团体
                name:
                  type: string
                  description: 个人姓名或团体名称
                gender:
                  type: string
                  enum:
                  - male
                  - female
                  description: 性别（个人报名必填）
                age:
                  type: integer
                  minimum: 1
                  maximum: 120
                  description: 年龄（个人报名必填）
                members:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: 成员姓名
                      age:
                        type: integer
                        minimum: 1
                        maximum: 120
                        description: 成员年龄
                    required:
                    - name
                    - age
                  description: 团体成员列表，至少 3 人；multipart 时可传 JSON 字符串
                introduction:
                  type: string
                  description: 个人/团体介绍
                avatar:
                  type: string
                  format: binary
                  description: 头像文件（与 avatar_url 二选一）
                avatar_url:
                  type: string
                  description: OSS 直传后的头像 URL
                photos:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: 展示照片（可多张）
              required:
              - registration_type
              - name
          application/json:
            schema:
              type: object
              properties:
                registration_type:
                  type: string
                  enum:
                  - individual
                  - group
                  description: 报名类型：individual=个人，group=团体
                name:
                  type: string
                  description: 个人姓名或团体名称
                gender:
                  type: string
                  enum:
                  - male
                  - female
                  description: 性别（个人报名必填）
                age:
                  type: integer
                  minimum: 1
                  maximum: 120
                  description: 年龄（个人报名必填）
                members:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: 成员姓名
                      age:
                        type: integer
                        minimum: 1
                        maximum: 120
                        description: 成员年龄
                    required:
                    - name
                    - age
                  description: 团体成员列表，至少 3 人；multipart 时可传 JSON 字符串
                introduction:
                  type: string
                  description: 个人/团体介绍
                avatar_url:
                  type: string
                  description: OSS 直传后的头像 URL
              required:
              - registration_type
              - name
              - avatar_url
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateApplication'
          description: ''
  /api/candidates/ranking/:
    get:
      operationId: candidates_ranking_list
      description: 排行榜，默认按热度值降序；可通过 sort_by=vote_count 改为按投票数降序。支持 gender、registration_type、name
        筛选；不传 registration_type 时返回全部。
      summary: 候选人排行榜
      parameters:
      - in: query
        name: gender
        schema:
          type: string
          enum:
          - female
          - male
        description: 按性别筛选：male=男，female=女
      - in: query
        name: name
        schema:
          type: string
        description: 按选手名称模糊搜索（个人姓名或团体名称，不区分大小写）
      - in: query
        name: registration_type
        schema:
          type: string
          enum:
          - group
          - individual
        description: 按报名类型筛选：individual=个人，group=团体；不传则返回全部
      - in: query
        name: sort_by
        schema:
          type: string
          enum:
          - heat_score
          - vote_count
        description: 排序方式：heat_score=按热度值降序，vote_count=按投票数降序；列表不传则按编号升序，排行榜不传则默认按热度值
      tags:
      - 候选人
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CandidateRanking'
          description: ''
  /api/config/oss/sts/:
    get:
      operationId: config_oss_sts_retrieve
      description: 前端直传 OSS 前调用此接口获取 STS 临时凭证。凭证仅允许向当前用户目录 `uploads/{user_id}/` 上传文件。
      summary: 获取 OSS 上传 STS 临时凭证
      tags:
      - 配置
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OSSStsCredential'
          description: ''
  /api/config/public/:
    get:
      operationId: config_public_retrieve
      description: 返回前端需要的公开配置项，如今日投票上限等。
      summary: 获取公开配置
      tags:
      - 配置
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicConfig'
          description: ''
  /api/gifts/:
    get:
      operationId: gifts_list
      summary: 获取礼物列表
      parameters:
      - name: page
        required: false
        in: query
        description: 分页结果集中的页码。
        schema:
          type: integer
      tags:
      - 礼物
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedGiftList'
          description: ''
  /api/gifts/history/:
    get:
      operationId: gifts_history_list
      summary: 我的礼物赠送记录
      parameters:
      - name: page
        required: false
        in: query
        description: 分页结果集中的页码。
        schema:
          type: integer
      tags:
      - 礼物
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedGiftTransactionList'
          description: ''
  /api/gifts/pay/:
    post:
      operationId: gifts_pay_create
      description: '根据礼物单价 × 数量自动计算应付金额，创建微信/支付宝订单。

        - 微信 Native（默认）：用 `pay_data.code_url` / `qr_code` 展示二维码

        - 微信 JSAPI：传 `payment_mode=jsapi` 与 `openid`，用 `pay_data.jsapi_params` 调起支付

        - 支付宝 Native：扫码（`qr_code`）

        - 支付宝 H5：传 `payment_mode=h5`，用 `pay_data.pay_url` 跳转手机网站支付

        支付成功后服务端回调自动赠送，可用订单号轮询状态。'
      summary: 按礼物价格发起支付
      tags:
      - 礼物
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayGiftRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PayGiftRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PayGiftRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/gifts/send/:
    post:
      operationId: gifts_send_create
      description: 按礼物单价 × 数量扣减余额并立即赠送。第三方支付请用 POST /api/gifts/pay/。
      summary: 余额赠送礼物
      tags:
      - 礼物
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendGiftRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SendGiftRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SendGiftRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/payments/dev-pay/:
    post:
      operationId: payments_dev_pay_create
      description: 开发环境模拟支付成功。
      summary: 模拟支付成功（仅开发环境）
      tags:
      - 钱包
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DevPayRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DevPayRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DevPayRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentOrder'
          description: ''
  /api/payments/orders/:
    get:
      operationId: payments_orders_list
      summary: 我的支付订单列表
      parameters:
      - name: page
        required: false
        in: query
        description: 分页结果集中的页码。
        schema:
          type: integer
      tags:
      - 钱包
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPaymentOrderList'
          description: ''
  /api/payments/orders/{order_no}/:
    get:
      operationId: payments_orders_retrieve
      summary: 查询支付订单状态
      parameters:
      - in: path
        name: order_no
        schema:
          type: string
        required: true
      tags:
      - 钱包
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/payments/payee-accounts/:
    get:
      operationId: payments_payee_accounts_retrieve
      summary: 收款账户列表
      tags:
      - 钱包
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: payments_payee_accounts_create
      summary: 绑定收款账户
      tags:
      - 钱包
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BindPayeeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BindPayeeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BindPayeeRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
    delete:
      operationId: payments_payee_accounts_destroy
      summary: 解绑收款账户
      tags:
      - 钱包
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/payments/recharge/:
    post:
      operationId: payments_recharge_create
      description: '创建充值订单并返回支付参数。

        - 微信 `payment_mode=native`（默认）：返回 `code_url` / `qr_code` 扫码支付

        - 微信 `payment_mode=jsapi`：需传 `openid`，返回 `jsapi_params` 供微信内调起支付

        - 支付宝 `payment_mode=native`（默认）：返回 `qr_code` 扫码

        - 支付宝 `payment_mode=h5`：返回 `pay_url`，前端跳转完成手机网站支付'
      summary: 创建充值订单
      tags:
      - 钱包
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRechargeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateRechargeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateRechargeRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/payments/wallet/:
    get:
      operationId: payments_wallet_retrieve
      summary: 查询钱包余额
      tags:
      - 钱包
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/payments/withdraw/:
    post:
      operationId: payments_withdraw_create
      description: 从余额提现到已绑定的微信 openid / 支付宝账号。微信新版商家转账可能返回 needUserConfirm，需前端拉起用户确认收款。
      summary: 申请提现
      tags:
      - 钱包
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWithdrawRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateWithdrawRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateWithdrawRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/payments/withdraws/:
